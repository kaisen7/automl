        x="5" y="5" 
        width="110" height="110" 
        rx="12" 
        fill="none" 
        stroke="rgba(99, 210, 179, 0.4)" 
        stroke-width="4"
    />

    <!-- Icon centered -->
    <g 
        transform="translate(20,20) scale(3)"
